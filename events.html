<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events - Ells Garden</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  display:flex;
  flex-direction:column;
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:#f2f2f2;
}

/* Top Bar */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:white;
  border-bottom:2px solid #1f6c8f;
}

.left-tools{
  display:flex;
  align-items:center;
  gap:15px;
}

.search-box{
  display:flex;
  align-items:center;
  border:2px solid #0b3850;
  width:320px;
  padding:10px;
}

.search-box input{
  border:none;
  outline:none;
  width:100%;
  font-size:20px;
}

.lang-select{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo{
  border:3px solid #0b3850;
  border-radius:50px;
  padding:15px 30px;
  font-size:28px;
  font-weight:bold;
  color:#1d5e2b;
}

/* Menu */
nav{
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:20px;
  background:white;
}

nav a{
  background:#0f6487;
  color:white;
  text-decoration:none;
  padding:12px 25px;
  font-size:18px;
  border:2px solid #08384d;
}

nav a:hover{
  background:#0b4f6b;
}

/* Content */
.content{
  padding:40px;
  background:white;
  margin:20px;
  border-radius:10px;
}

/* Gallery */
.gallery{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  padding:40px;
  background:white;
  margin:20px;
  border-radius:10px;
  justify-content:center;
}

.gallery img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:8px;
}

/* Footer */
footer{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  background:white;
  border-top:2px solid #1f6c8f;
  text-align:center;
  margin-top:auto;
}

footer div{
  padding:25px;
  border-right:1px solid #1f6c8f;
}

footer div:last-child{
  border-right:none;
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">

  <div class="left-tools">
    <div class="search-box">
      <input type="text" placeholder="Search...">
      🔍
    </div>

    <div class="lang-select">
      🌍
      <select onchange="setLanguage(this.value)">
        <option value="en">EN</option>
        <option value="tn">TN</option>
      </select>
    </div>
  </div>

  <div class="logo">ELLS GARDEN</div>

</div>
<!-- Menu -->
<nav>
  <a href="index.html" id="home">Homepage</a>
  <a href="gallery.html" id="gallery">Gallery</a>
  <a href="about us.html" id="about">About Us</a>
  <a href="events.html" id="events">Events</a>
  <a href="services.html" id="pricing">Pricing</a>
  <a href="location.html" id="location">Location</a>
  <a href="contact us.html" id="contact">Contact Us</a>
</nav>

<!-- Content -->
 <section class="gallery">
  <img src="images/IMG_0848.JPG" width="500px" height="500px">
  <img src="images/IMG_5514.JPG" width="500px" height="500px">
  <img src="images/graden front2.jpg" width="500px" height="500px">
  <img src="images/IMG_5579.JPG" width="500px" height="500px">
  <img src="images/IMG_0287.HEIC" width="500px" height="500px">
  <img src="images/IMG_5540.JPG" width="500px" height="500px">
</section>


<!-- Footer -->
<footer>
  <div id="footer1">Contact us</div>
  <div id="footer2">Social Media: TikTok: @ells.garden Facebook: @ELLS</div>
  <div id="footer3">b2nkwe@yahoo.com</div>
</footer>

<script>
const translations = {
  en:{
    home:"Homepage",
    gallery:"Gallery",
    about:"About Us",
    events:"Events",
    pricing:"Pricing",
    location:"Location",
    contact:"Contact Us",
    footer1:"Contact us"
  },

  tn:{
    home:"Gae",
    gallery:"Ditshwantsho",
    about:"Ka Rona",
    events:"Ditiragalo",
    pricing:"Ditlhwatlhwa",
    location:"Lefelo",
    contact:"Ikgolaganye",
    footer1:"Ikgolaganye"
  }
};

function setLanguage(lang){
  document.getElementById("home").innerText = translations[lang].home;
  document.getElementById("gallery").innerText = translations[lang].gallery;
  document.getElementById("about").innerText = translations[lang].about;
  document.getElementById("events").innerText = translations[lang].events;
  document.getElementById("pricing").innerText = translations[lang].pricing;
  document.getElementById("location").innerText = translations[lang].location;
  document.getElementById("contact").innerText = translations[lang].contact;
  document.getElementById("footer1").innerText = translations[lang].footer1;
}

window.onload = function(){
  const savedLang = localStorage.getItem("language") || "en";
  setLanguage(savedLang);
}
</script>

</body>
</html>
