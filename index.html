<main>

<script>
let index = 0;

function visibleSlides(){
  if(window.innerWidth <= 600) return 1;
  if(window.innerWidth <= 900) return 2;
  return 4;
}

function moveSlide(step){
  const track = document.getElementById("track");
  const slides = document.querySelectorAll(".slide");
  const total = slides.length;

  index += step;

  if(index < 0) index = total - visibleSlides();
  if(index > total - visibleSlides()) index = 0;

  const slideWidth = slides[0].offsetWidth + 25;
  track.style.transform = `translateX(-${index * slideWidth}px)`;
}

setInterval(()=>moveSlide(1),3000);
</script>

<script>
const translations = {
  en:{
    home:"HOME",
    gallery:"GALLERY",
    about:"ABOUT US",
    events:"EVENTS",
    pricing:"PRICING",
    location:"LOCATION",
    contact:"CONTACT US",
    feedback:"FEEDBACK"
  },
  tn:{
    home:"Gae",
    gallery:"Ditshwantsho",
    about:"Ka Rona",
    events:"Ditiragalo",
    pricing:"Ditlhwatlhwa",
    location:"Lefelo",
    contact:"Ikgolaganye",
    feedback:"Maikutlo"
  }
};

function setLanguage(lang){
  const navLinks = document.querySelectorAll('nav a');
  navLinks.forEach(link => {
    const id = link.id;
    if (translations[lang][id]) {
      link.textContent = translations[lang][id];
    }
  });
  localStorage.setItem("language", lang);
}

window.onload = function(){
  const savedLang = localStorage.getItem("language") || "en";
  setLanguage(savedLang);
}
</script>
