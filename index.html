<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELLS GARDEN</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  font-family:Arial, sans-serif;
  background:#efefef;
}

body{
  display:flex;
  flex-direction:column;
}

/* TOP BAR */
.top-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 25px;
  border-bottom:2px solid #2c7fb0;
  background:#f3f3f3;
}

.left-group{
  display:flex;
  align-items:center;
  gap:18px;
}

.search-box{
  width:340px;
  height:58px;
  border:3px solid #12394a;
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

.search-box input{
  border:none;
  outline:none;
  font-size:22px;
  width:100%;
}

.search-icon{
  font-size:28px;
}

.lang-box{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:22px;
}

.lang-box select{
  border:none;
  background:transparent;
  font-size:20px;
  cursor:pointer;
}

.logo{
  border:4px solid #12394a;
  border-radius:50px;
  padding:15px 35px;
  font-size:34px;
  font-weight:bold;
  color:#1d5e2b;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}

/* NAVIGATION */
nav{
  display:flex;
  justify-content:space-evenly;
  align-items:center;
  padding:18px 10px;
  background:#f5f5f5;
}

nav a{
  text-decoration:none;
  background:#0f6487;
  color:white;
  padding:12px 28px;
  border:2px solid #08384d;
  font-size:18px;
}

.menu-icon{
  font-size:42px;
  color:#0f6487;
}

/* MAIN CONTENT */
main{
  flex:1;
}

/* HERO */
.hero{
  position:relative;
}

.hero img{
  width:100%;
  height:520px;
  object-fit:cover;
}

.hero-text{
  position:absolute;
  top:35px;
  width:100%;
  text-align:center;
  font-size:36px;
  font-weight:bold;
}

.book-btn{
  position:absolute;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  color:#31596f;
  text-decoration:underline;
}

/* CAROUSEL */
.carousel-section{
  position:relative;
  padding:25px 55px;
  background:#f5f5f5;
  overflow:hidden;
}

.carousel-wrapper{
  overflow:hidden;
}

.carousel-track{
  display:flex;
  gap:25px;
  transition:transform .5s ease;
}

.slide{
  min-width:calc(25% - 19px);
}

.slide img{
  width:100%;
  height:235px;
  object-fit:cover;
  display:block;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#0f6487;
  color:white;
  border:none;
  font-size:35px;
  width:42px;
  height:42px;
  cursor:pointer;
}

.left-arrow{left:10px;}
.right-arrow{right:10px;}

/* FOOTER */
footer{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  border-top:2px solid #2c7fb0;
  background:#f3f3f3;
  text-align:center;
}

footer div{
  padding:28px 15px;
  font-size:18px;
  border-right:1px solid #2c7fb0;
}

footer div:last-child{
  border-right:none;
}

footer a{
  color:#2f627b;
}

/* MOBILE */
@media(max-width:900px){
  .slide{min-width:calc(50% - 13px);}
  nav{
    flex-wrap:wrap;
    gap:10px;
  }
  .search-box{width:260px;}
}

@media(max-width:600px){
  .top-bar{
    flex-direction:column;
    gap:15px;
  }

  .left-group{
    flex-direction:column;
    width:100%;
  }

  .search-box{
    width:100%;
  }

  .slide{
    min-width:100%;
  }

  footer{
    grid-template-columns:1fr;
  }

  footer div{
    border-right:none;
    border-bottom:1px solid #2c7fb0;
  }
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top-bar">
  <div class="left-group">
    🌍
    <div class="search-box">
      <input type="text" placeholder="Search...">
      <span class="search-icon">⌕</span>
    </div>

    <div class="lang-box">
      lang
      <select>
        <option>EN</option>
        <option>TN</option>
      </select>
    </div>

  </div>

  <div class="logo">ELLS<br>GARDEN</div>
</div>

<!-- NAV -->
<nav>
  <a href="index.html">Homepage</a>
  <a href="gallery.html">Gallery</a>
  <a href="about us.html">About Us</a>
  <a href="events.html">Events</a>
  <a href="pricing.html">Pricing</a>
  <a href="location.html">Location</a>
  <a href="contact us.html">Contact us</a>
  <div class="menu-icon">☰</div>
</nav>

<main>



<!-- CAROUSEL -->
<section class="carousel-section">

  <button class="arrow left-arrow" onclick="moveSlide(-1)">❮</button>

  <div class="carousel-wrapper">
    <div class="carousel-track" id="track">

      <div class="slide"><img src="images/flowers.jpg"></div>
      <div class="slide"><img src="images/gardenfront.jpg"></div>
      <div class="slide"><img src="images/graden front2.jpg"></div>
      <div class="slide"><img src="images/IMG_0848.JPG"></div>
      <div class="slide"><img src="images/IMG_5540.JPG"></div>
      <div class="slide"><img src="images/hall.jpg"></div>
      <div class="slide"><img src="images/IMG_5587.JPG"></div>

    </div>
  </div>


  <button class="arrow right-arrow" onclick="moveSlide(1)">❯</button>

</section>
<section class="content">
<banner class="hero">
  <img src="images/overview.jpg">
  <a href="contact us.html" class="book-btn">Book Now</a>


</section>
</main>

<!-- FOOTER -->
<footer>
  <div><a href="contact us.html">Contact us</a></div>
  <div>Social Media: TikTok: @ells.garden Facebook: @ELLS</div>
  <div>b2nkwe@yahoo.com</div>
</footer>

<script>
let index = 0;

function visibleSlides(){
  if(window.innerWidth <= 600) return 1;
  if(window.innerWidth <= 900) return 2;
  return 4;
}

function moveSlide(step){
  const track = document.getElementById("track");
  const slides = document.querySelectorAll(".slide");
  const total = slides.length;

  index += step;

  if(index < 0) index = total - visibleSlides();
  if(index > total - visibleSlides()) index = 0;

  const slideWidth = slides[0].offsetWidth + 25;
  track.style.transform = `translateX(-${index * slideWidth}px)`;
}

setInterval(()=>moveSlide(1),3000);
</script>

<script>
const translations = {
  en:{
    home:"HOME",
    gallery:"GALLERY",
    about:"ABOUT US",
    events:"EVENTS",
    pricing:"PRICING",
    location:"LOCATION",
    contact:"CONTACT US",
    feedback:"FEEDBACK"
  },
  tn:{
    home:"Gae",
    gallery:"Ditshwantsho",
    about:"Ka Rona",
    events:"Ditiragalo",
    pricing:"Ditlhwatlhwa",
    location:"Lefelo",
    contact:"Ikgolaganye",
    feedback:"Maikutlo"
  }
};

function setLanguage(lang){
  const navLinks = document.querySelectorAll('nav a');
  navLinks.forEach(link => {
    const id = link.id;
    if (translations[lang][id]) {
      link.textContent = translations[lang][id];
    }
  });
  localStorage.setItem("language", lang);
}

window.onload = function(){
  const savedLang = localStorage.getItem("language") || "en";
  setLanguage(savedLang);
}
</script>

</body>
</html>
