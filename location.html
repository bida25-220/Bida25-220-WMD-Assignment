<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location - Ells Garden</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="page-location">

<div class="page">

<div class="top-bar">
  <div class="left-tools">
    <div class="search-box">
      <input type="text" placeholder="Search..."> 🔍
    </div>
    <div class="lang-select">
      🌍
      <select onchange="setLanguage(this.value)">
        <option value="en">EN</option>
        <option value="tn">TN</option>
      </select>
    </div>
  </div>

  <img class="logo-img" src="images/logom.png" alt="logo" width="200px" height="100px">
</div>

<nav>
  <a href="index.html" id="home">HOME</a>
  <a href="about us.html" id="about">ABOUT US</a>
  <a href="events.html" id="events">EVENTS</a>
  <a href="gallery.html" id="gallery">GALLERY</a>
  <a href="pricing.html" id="pricing">PRICING</a>
  <a href="location.html" id="location">LOCATION</a>
  <a href="contact us.html" id="contact">CONTACT US</a>
  <a href="feedback.html" id="feedback">FEEDBACK</a>
</nav>

<section class="content">
  <h1>LOCATION</h1>

  <div class="location-grid">
    <img src="images/map.png">

    <div class="info">
      Along road towards Ramotswa<br><br>
      Google maps pin location<br>
      <a href="https://maps.app.goo.gl/6HfoUyyQEMS9opTWA" target="_blank">View on Google Maps</a>
    </div>
  </div>
</section>

<footer>
  <div><a href="contact us.html">Contact us</a></div>
  <div>Follow us:<i class="fa-brands fa-tiktok"></i>    <i class="fa-brands fa-facebook"></i>   <i class="fa-brands fa-whatsapp"></i> </div>
  <div>b2nkwe@yahoo.com</div>
</footer>
<div class="copyright">© 2026 Ells Garden. All rights reserved.</div>

</div>

<script>
const translations = {
  en:{
    home:"HOME",
    gallery:"GALLERY",
    about:"ABOUT US",
    events:"EVENTS",
    pricing:"PRICING",
    location:"LOCATION",
    contact:"CONTACT US",
    feedback:"FEEDBACK"
  },
  tn:{
    home:"Gae",
    gallery:"Ditshwantsho",
    about:"Ka Rona",
    events:"Ditiragalo",
    pricing:"Ditlhwatlhwa",
    location:"Lefelo",
    contact:"Ikgolaganye",
    feedback:"Maikutlo"
  }
};

function setLanguage(lang){
  const navLinks = document.querySelectorAll('nav a');
  navLinks.forEach(link => {
    const id = link.id;
    if (translations[lang][id]) {
      link.textContent = translations[lang][id];
    }
  });
  localStorage.setItem("language", lang);
}

window.onload = function(){
  const savedLang = localStorage.getItem("language") || "en";
  setLanguage(savedLang);
}
</script>
</body>
</html>
