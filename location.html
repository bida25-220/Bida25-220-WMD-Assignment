<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location - Ells Garden</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial,sans-serif;
  background:#1f2230;
  padding:5px;
}

.page{
  background:#f4f4f4;
  min-height:100vh;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:2px solid #4e9bc2;
}

.left-tools{
  display:flex;
  align-items:center;
  gap:15px;
}

.search-box{
  display:flex;
  align-items:center;
  border:2px solid #222;
  padding:10px;
  width:330px;
}

.search-box input{
  border:none;
  outline:none;
  width:100%;
  font-size:18px;
  background:transparent;
}

.lang-select{
  display:flex;
  align-items:center;
  gap:10px;
}

.lang-select select{
  padding:8px;
}

.logo{
  border:4px solid #0b3850;
  border-radius:60px;
  padding:20px 35px;
  color:#1f6c34;
  font-size:28px;
  font-weight:bold;
}

/* Navigation Menu */
nav{
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:20px;
  background:white;
}

nav a{
  background:#0f6487;
  color:white;
  text-decoration:none;
  padding:12px 25px;
  font-size:18px;
  border:2px solid #08384d;
}

nav a:hover{
  background:#0b4f6b;
}

.content{
  padding:30px;
}

.content h1{
  font-size:45px;
  margin-bottom:30px;
}

.location-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:40px;
}

.location-grid img{
  width:100%;
  height:430px;
  object-fit:cover;
}

.info{
  font-size:28px;
  line-height:1.6;
}

footer{
  margin-top:80px;
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  text-align:center;
  border-top:2px solid #4e9bc2;
}

footer div{
  padding:25px;
  border-right:1px solid #4e9bc2;
}

footer div:last-child{border-right:none;}
</style>
</head>
<body>

<div class="page">

<div class="top-bar">
  <div class="left-tools">
    <div class="search-box">
      <input type="text" placeholder="Search..."> 🔍
    </div>
    <div class="lang-select">
      🌍
      <select onchange="setLanguage(this.value)">
        <option value="en">EN</option>
        <option value="tn">TN</option>
      </select>
    </div>
  </div>

  <div class="logo">ELLS GARDEN</div>
</div>

<nav>
  <a href="index.html" id="home">HOME</a>
  <a href="about us.html" id="about">ABOUT US</a>
  <a href="events.html" id="events">EVENTS</a>
  <a href="gallery.html" id="gallery">GALLERY</a>
  <a href="pricing.html" id="pricing">PRICING</a>
  <a href="location.html" id="location">LOCATION</a>
  <a href="contact us.html" id="contact">CONTACT US</a>
  <a href="feedback.html" id="feedback">FEEDBACK</a>
</nav>

<section class="content">
  <h1>LOCATION</h1>

  <div class="location-grid">
    <img src="images/map.png">

    <div class="info">
      Along road towards Ramotswa<br><br>
      Google maps pin location<br>
      <a href="https://maps.app.goo.gl/6HfoUyyQEMS9opTWA" target="_blank">View on Google Maps</a>
    </div>
  </div>
</section>

<footer>
  <div>Contact us</div>
  <div>Social Media: TikTok: @ells.garden Facebook: @ELLS</div>
  <div>b2nkwe@yahoo.com</div>
</footer>

</div>

<script>
const translations = {
  en:{
    home:"HOME",
    gallery:"GALLERY",
    about:"ABOUT US",
    events:"EVENTS",
    pricing:"PRICING",
    location:"LOCATION",
    contact:"CONTACT US",
    feedback:"FEEDBACK"
  },
  tn:{
    home:"Gae",
    gallery:"Ditshwantsho",
    about:"Ka Rona",
    events:"Ditiragalo",
    pricing:"Ditlhwatlhwa",
    location:"Lefelo",
    contact:"Ikgolaganye",
    feedback:"Maikutlo"
  }
};

function setLanguage(lang){
  const navLinks = document.querySelectorAll('nav a');
  navLinks.forEach(link => {
    const id = link.id;
    if (translations[lang][id]) {
      link.textContent = translations[lang][id];
    }
  });
  localStorage.setItem("language", lang);
}

window.onload = function(){
  const savedLang = localStorage.getItem("language") || "en";
  setLanguage(savedLang);
}
</script>
</body>
</html>
