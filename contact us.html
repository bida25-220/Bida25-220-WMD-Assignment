<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ells Garden - Contact</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    background: white;
    border-bottom: 2px solid #1f6c8f;
}

.left-group {
    display: flex;
    align-items: center;
    gap: 18px;
}

.search-box {
    width: 320px;
    height: 58px;
    border: 3px solid #0b3850;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    border-radius: 12px;
}

.search-box input {
    border: none;
    outline: none;
    font-size: 22px;
    width: 100%;
}

.search-icon {
    font-size: 28px;
}

.lang-select {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
}

.lang-select select {
    border: none;
    background: transparent;
    font-size: 20px;
    cursor: pointer;
}

.logo {
    border: 3px solid #0b3850;
    border-radius: 50px;
    padding: 15px 30px;
    font-size: 28px;
    font-weight: bold;
    color: #1d5e2b;
}

.container {
    width: 100%;
    margin: 0;
    background: #eee;
    border-radius: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    border: 2px solid #333;
    border-radius: 50%;
    padding: 10px 20px;
    font-weight: bold;
    background: #ddd;
}

    nav {
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        padding: 18px 10px;
        background: #f5f5f5;
        flex-wrap: wrap;
        gap: 10px;
    }

    nav a {
        text-decoration: none;
        background: #0f6487;
        color: white;
        padding: 12px 28px;
        border: 2px solid #08384d;
        font-size: 18px;
        border-radius: 10px;
    }

    nav a:hover {
        background: #0b4f6b;
    }

    .container {
        width: 90%;
        margin: 20px auto;
        background: #eee;
        border-radius: 15px;
        padding: 0;
    }


.form-right {
    width: 30%;
}

label {
    display: block;
    margin: 12px 0 6px;
    font-size: 18px;
    color: #1f2430;
}

input, textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 8px;
    margin: 0 0 16px;
    background: #2c5c8a;
    border: none;
    color: white;
}

textarea {
    height: 60px;
}

.buttons {
    margin-top: 10px;
}

.cancel {
    background: red;
    color: white;
    padding: 8px 20px;
    border: none;
}

.submit {
    background: green;
    color: white;
    padding: 8px 20px;
    border: none;
}

footer {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    border-top: 2px solid #2c7fb0;
    background: #f3f3f3;
    text-align: center;
    margin-top: 30px;
}

footer div {
    padding: 28px 15px;
    font-size: 18px;
    border-right: 1px solid #2c7fb0;
}

footer div:last-child {
    border-right: none;
}

footer a {
    color: #2f627b;
}

@media(max-width:900px){
    footer {
        grid-template-columns: 1fr;
    }

    footer div {
        border-right: none;
        border-bottom: 1px solid #2c7fb0;
    }
}
</style>
</head>

<body>

<div class="top-bar">
    <div class="left-group">
        <div class="search-box">
            <input type="text" placeholder="Search...">
            <span class="search-icon">⌕</span>
        </div>
        <div class="lang-select">
            🌍
            <select onchange="setLanguage(this.value)">
                <option value="en">EN</option>
                <option value="tn">TN</option>
            </select>
        </div>
    </div>
    <div class="logo">ELLS GARDEN</div>
</div>

<div class="container">

    <div class="header">
        <h2>CONTACT US 📞</h2>
    </div>

    <nav>
        <a href="index.html" id="home">HOME</a>
        <a href="about us.html" id="about">ABOUT US</a>
        <a href="events.html" id="events">EVENTS</a>
        <a href="gallery.html" id="gallery">GALLERY</a>
        <a href="pricing.html" id="pricing">PRICING</a>
        <a href="location.html" id="location">LOCATION</a>
        <a href="contact us.html" id="contact">CONTACT US</a>
        <a href="feedback.html" id="feedback">FEEDBACK</a>
    </nav>

    <h3 style="text-align:center;">CONTACT/BOOKING</h3>

    <form action="feedback.html" method="get">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required>
 
    <label for="phone">Phone Number</label>
    <input type="text" id="phone" name="phone" required>
 
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required>
 
    <label for="subject">Event Type</label>
    <input type="text" id="subject" name="subject" required>

    <label for="message">Email Message</label>
    <textarea id="message" name="message" required></textarea>

    <label for="date">Preferred Date</label>
    <input type="date" id="date" name="date" required>


    <div class="buttons">
        <button type="reset" class="clear-btn">Clear</button>
        <button type="submit" class="submit-btn">Submit</button>
    </div>
</form>
        <div class="form-right">
            <h4>Contact us</h4>
            <p>
                Phone numbers: +267 73333174,<br>
                72433286,<br>
                71299479
            </p>
            <p>Email: b2nkwe@yahoo.com</p>
        </div>

    </div>
</div>

<footer>
        <div><a href="contact us.html">Contact us</a></div>
        <div>Social Media: TikTok @ells.garden | Facebook @ELLS</div>
        <div>b2nkwe@yahoo.com</div>
    </footer>

<script>
const translations = {
  en:{
    home:"HOME",
    gallery:"GALLERY",
    about:"ABOUT US",
    events:"EVENTS",
    pricing:"PRICING",
    location:"LOCATION",
    contact:"CONTACT US",
    feedback:"FEEDBACK"
  },
  tn:{
    home:"Gae",
    gallery:"Ditshwantsho",
    about:"Ka Rona",
    events:"Ditiragalo",
    pricing:"Ditlhwatlhwa",
    location:"Lefelo",
    contact:"Ikgolaganye",
    feedback:"Maikutlo"
  }
};

function setLanguage(lang){
  const navLinks = document.querySelectorAll('nav a');
  navLinks.forEach(link => {
    const id = link.id;
    if (translations[lang][id]) {
      link.textContent = translations[lang][id];
    }
  });
  localStorage.setItem("language", lang);
}

window.onload = function(){
  const savedLang = localStorage.getItem("language") || "en";
  setLanguage(savedLang);
}
</script>

</body>
</html>
