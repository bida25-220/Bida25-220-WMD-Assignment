<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Ells Garden</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="page-gallery">

<div class="page">

<div class="top-bar">
  <div class="left-group">
    <div class="search-box">
      <input type="text" placeholder="Search...">
      <span class="search-icon">⌕</span>
    </div>
    <div class="lang-box">
      🌍
      <select>
        <option>EN</option>
        <option>TN</option>
      </select>
    </div>
  </div>
  <img class="logo-img" src="images/logom.png" alt="logo" width="200px" height="100px">
</div>

<nav>
  <a href="index.html" id="home">Homepage</a>
  <a href="gallery.html" id="gallery">Gallery</a>
  <a href="about us.html" id="about">About Us</a>
  <a href="events.html" id="events">Events</a>
  <a href="pricing.html" id="pricing">Pricing</a>
  <a href="location.html" id="location">Location</a>
  <a href="contact us.html" id="contact">Contact Us</a>
</nav>

<section class="gallery">
  <img src="images/flowers.jpg">
  <img src="images/garden.jpg">
  <img src="images/gardenfront.jpg">
  <img src="images/gardenfront2.jpg">
  <img src="images/pool1.1.jpg">
  <img src="images/overview.jpg">
</section>

<footer>
  <div><a href="contact us.html">Contact us</a></div>
  <div>Follow us:<i class="fa-brands fa-tiktok"></i>    <i class="fa-brands fa-facebook"></i>   <i class="fa-brands fa-whatsapp"></i> </div>
  <div>b2nkwe@yahoo.com</div>
</footer>
<div class="copyright">© 2026 Ells Garden. All rights reserved.</div>

</div>

<script>
const translations = {
  en:{
    home:"HOME",
    gallery:"GALLERY",
    about:"ABOUT US",
    events:"EVENTS",
    pricing:"PRICING",
    location:"LOCATION",
    contact:"CONTACT US",
    feedback:"FEEDBACK"
  },
  tn:{
    home:"Gae",
    gallery:"Ditshwantsho",
    about:"Ka Rona",
    events:"Ditiragalo",
    pricing:"Ditlhwatlhwa",
    location:"Lefelo",
    contact:"Ikgolaganye",
    feedback:"Maikutlo"
  }
};

function setLanguage(lang){
  const navLinks = document.querySelectorAll('nav a');
  navLinks.forEach(link => {
    const id = link.id;
    if (translations[lang][id]) {
      link.textContent = translations[lang][id];
    }
  });
  localStorage.setItem("language", lang);
}

window.onload = function(){
  const savedLang = localStorage.getItem("language") || "en";
  setLanguage(savedLang);
}
</script>

</body>
</html>
