<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - Ells Garden</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="page-feedback">

<header>

    <div class="top-bar">

        <div class="left-tools">
            <div class="search-box">
                <input type="text" placeholder="Search...">
            </div>
            🌍
            <div class="language-select">
                <select onchange="setLanguage(this.value)">
                    <option value="en">EN</option>
                    <option value="tn">TN</option>
                </select>
            </div>
        </div>

        <img class="logo-img" src="images/logom.png" alt="logo" width="200px" height="100px">

    </div>

    <nav>
        <a href="index.html" id="home">Homepage</a>
        <a href="about us.html" id="about">About Us</a>
        <a href="events.html" id="events">Events</a>
        <a href="gallery.html" id="gallery">Gallery</a>
        <a href="pricing.html" id="pricing">Pricing</a>
        <a href="location.html" id="location">Location</a>
        <a href="contact us.html" id="contact">Contact Us</a>
        <a href="feedback.html" id="feedback">Feedback</a>
    </nav>

</header>

<main>

    <div class="page-title">FEEDBACK</div>

    <div class="feedback-box">

        <h2>We Value Your Feedback</h2>

        <form>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Rate Your Experience</label>
                <select>
                    <option>Excellent</option>
                    <option>Good</option>
                    <option>Average</option>
                    <option>Poor</option>
                </select>
            </div>

            <div class="form-group">
                <label>Your Feedback</label>
                <textarea placeholder="Write your comments here..."></textarea>
            </div>

            <button type="submit">Submit Feedback</button>

        </form>

    </div>

</main>

<footer>
    <div><a href="contact us.html">Contact us</a></div>
    <div>Follow us:<i class="fa-brands fa-tiktok"></i>    <i class="fa-brands fa-facebook"></i>   <i class="fa-brands fa-whatsapp"></i> </div>
    <div>b2nkwe@yahoo.com</div>
</footer>
<div class="copyright">© 2026 Ells Garden. All rights reserved.</div>

<script>
const translations = {
  en:{
    home:"Homepage",
    gallery:"Gallery",
    about:"About Us",
    events:"Events",
    pricing:"Pricing",
    location:"Location",
    contact:"Contact Us",
    feedback:"Feedback"
  },
  tn:{
    home:"Gae",
    gallery:"Ditshwantsho",
    about:"Ka Rona",
    events:"Ditiragalo",
    pricing:"Ditlhwatlhwa",
    location:"Lefelo",
    contact:"Ikgolaganye",
    feedback:"Maikutlo"
  }
};

function setLanguage(lang){
  const navLinks = document.querySelectorAll('nav a');
  navLinks.forEach(link => {
    const id = link.id;
    if (translations[lang][id]) {
      link.textContent = translations[lang][id];
    }
  });
  localStorage.setItem("language", lang);
}

window.onload = function(){
  const savedLang = localStorage.getItem("language") || "en";
  setLanguage(savedLang);
}
</script>

</body>
</html>
