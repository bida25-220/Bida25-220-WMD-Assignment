<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - Ells Garden</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    height:100%;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
}

body{
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    border-bottom:2px solid #2e7fa3;
    padding:18px 30px;
    background:#f2f2f2;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.left-tools{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.search-box input{
    padding:10px 15px;
    width:220px;
    border:1px solid #999;
    border-radius:20px;
    outline:none;
}

.language-select select{
    padding:10px;
    border:1px solid #999;
    border-radius:20px;
    cursor:pointer;
}

.logo{
    width:210px;
    height:90px;
    border:4px solid #0b536c;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e8ded9;
    color:#0d5c2f;
    font-size:34px;
    font-weight:bold;
    text-align:center;
    line-height:1.1;
    font-family:Georgia, serif;
    box-shadow:3px 3px 8px rgba(0,0,0,0.25);
}

/* NAVIGATION */
nav{
    margin-top:18px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:18px 10px;
    background:#f5f5f5;
    flex-wrap:wrap;
    gap:10px;
}

nav a{
    text-decoration:none;
    background:#0f6487;
    color:white;
    padding:12px 28px;
    border:2px solid #08384d;
    font-size:18px;
    border-radius:10px;
}

nav a:hover{
    background:#0b4f6b;
}

/* MAIN */
main{
    flex:1;
    padding:40px 25px;
}

.page-title{
    text-align:center;
    font-size:42px;
    font-weight:bold;
    margin-bottom:35px;
    font-family:Georgia, serif;
}

.feedback-box{
    max-width:850px;
    margin:auto;
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.feedback-box h2{
    text-align:center;
    margin-bottom:25px;
    font-size:28px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:12px;
    border:1px solid #bbb;
    border-radius:8px;
    font-size:16px;
}

.form-group textarea{
    resize:vertical;
    min-height:140px;
}

button{
    width:100%;
    padding:14px;
    background:#2e7fa3;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#256682;
}

/* FOOTER */
footer{
    border-top:2px solid #2e7fa3;
    background:#f2f2f2;
    margin-top:auto;
}

.footer-container{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    text-align:center;
}

.footer-box{
    padding:22px 15px;
    border-right:1px solid #2e7fa3;
}

.footer-box:last-child{
    border-right:none;
}

.footer-box a{
    color:#2e7fa3;
    font-weight:bold;
    text-decoration:underline;
}

/* MOBILE */
@media(max-width:900px){

    .top-bar{
        flex-direction:column;
    }

    .logo{
        width:180px;
        height:80px;
        font-size:28px;
    }

    .footer-container{
        grid-template-columns:1fr;
    }

    .footer-box{
        border-right:none;
        border-bottom:1px solid #2e7fa3;
    }

    .footer-box:last-child{
        border-bottom:none;
    }

    .feedback-box{
        padding:25px;
    }
}
</style>
</head>

<body>

<header>

    <div class="top-bar">

        <div class="left-tools">
            <div class="search-box">
                <input type="text" placeholder="Search...">
            </div>
            🌍
            <div class="language-select">
                <select onchange="setLanguage(this.value)">
                    <option value="en">EN</option>
                    <option value="tn">TN</option>
                </select>
            </div>
        </div>

        <div class="logo">
            ELLS<br>GARDEN
        </div>

    </div>

    <nav>
        <a href="index.html" id="home">Homepage</a>
        <a href="about us.html" id="about">About Us</a>
        <a href="events.html" id="events">Events</a>
        <a href="gallery.html" id="gallery">Gallery</a>
        <a href="pricing.html" id="pricing">Pricing</a>
        <a href="location.html" id="location">Location</a>
        <a href="contact us.html" id="contact">Contact Us</a>
        <a href="feedback.html" id="feedback">Feedback</a>
    </nav>

</header>

<main>

    <div class="page-title">FEEDBACK</div>

    <div class="feedback-box">

        <h2>We Value Your Feedback</h2>

        <form>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Rate Your Experience</label>
                <select>
                    <option>Excellent</option>
                    <option>Good</option>
                    <option>Average</option>
                    <option>Poor</option>
                </select>
            </div>

            <div class="form-group">
                <label>Your Feedback</label>
                <textarea placeholder="Write your comments here..."></textarea>
            </div>

            <button type="submit">Submit Feedback</button>

        </form>

    </div>

</main>

<footer>

    <div class="footer-container">

        <div class="footer-box">
            <a href="contact us.html">Contact us</a>
        </div>

        <div class="footer-box">
            Social Media: TikTok: @ells.garden Facebook: @ELLS
        </div>

        <div class="footer-box">
            b2nkwe@yahoo.com
        </div>

    </div>

</footer>

<script>
const translations = {
  en:{
    home:"Homepage",
    gallery:"Gallery",
    about:"About Us",
    events:"Events",
    pricing:"Pricing",
    location:"Location",
    contact:"Contact Us",
    feedback:"Feedback"
  },
  tn:{
    home:"Gae",
    gallery:"Ditshwantsho",
    about:"Ka Rona",
    events:"Ditiragalo",
    pricing:"Ditlhwatlhwa",
    location:"Lefelo",
    contact:"Ikgolaganye",
    feedback:"Maikutlo"
  }
};

function setLanguage(lang){
  const navLinks = document.querySelectorAll('nav a');
  navLinks.forEach(link => {
    const id = link.id;
    if (translations[lang][id]) {
      link.textContent = translations[lang][id];
    }
  });
  localStorage.setItem("language", lang);
}

window.onload = function(){
  const savedLang = localStorage.getItem("language") || "en";
  setLanguage(savedLang);
}
</script>

</body>
</html>
